<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // Store the path for the SPA to restore after redirect
    var pathSegmentsToKeep = 1; // '/Jeopardy-Player' = 1 segment
    var l = window.location;
    sessionStorage.setItem('spa-redirect',
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/') +
      l.search + l.hash
    );
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/'
    );
  </script>
</head>
<body>
</body>
</html>
