<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpg" href="/j_logo.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jeopardy!</title>
    <!-- Preload ethereal shadow textures to avoid delay on transition screens -->
    <link rel="preload" as="image" href="https://framerusercontent.com/images/ceBGguIpUU8luwByxuQz79t7To.png" crossorigin="anonymous" />
    <link rel="preload" as="image" href="https://framerusercontent.com/images/g0QcWrxr87K0ufOxIUFBakwYA8.png" crossorigin="anonymous" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function() {
        var redirect = sessionStorage.getItem('spa-redirect');
        if (redirect) {
          sessionStorage.removeItem('spa-redirect');
          var base = '/Jeopardy-Player/';
          window.history.replaceState(null, '', base + redirect);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
